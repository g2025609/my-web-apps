<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python WorkStation</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root { 
            --bg: #f0f2f5; 
            --panel: #2c3e50; 
            --accent: #3498db; 
            --sidebar-width: 280px;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; height: 100vh; margin: 0; background: var(--bg); color: #333; overflow: hidden; }
        
        /* サイドバーの開閉アニメーション */
        #sidebar { 
            width: var(--sidebar-width); 
            background: var(--panel); 
            color: white; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, margin-left 0.3s ease;
            position: relative;
            z-index: 10;
        }
        
        /* サイドバーが閉じている状態 */
        body.sidebar-closed #sidebar {
            margin-left: calc(var(--sidebar-width) * -1 - 50px);
        }

        /* 開閉スイッチ（タブ） */
        #sidebar-toggle {
            position: absolute;
            right: -40px;
            top: 20px;
            width: 40px;
            height: 50px;
            background: var(--panel);
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        #sidebar h3 { margin-top: 0; border-bottom: 2px solid #34495e; padding-bottom: 10px; font-size: 1.2rem; white-space: nowrap; }
        #project-list { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
        .menu-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: #34495e; color: white; border: none; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; font-size: 0.95rem; white-space: nowrap; }
        .menu-btn:hover { background: var(--accent); transform: translateX(5px); }
        
        /* メインエリア */
        #main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 40px; overflow-y: auto; transition: width 0.3s ease; }
        #title { margin: 0 0 20px 0; color: var(--panel); font-size: 2rem; }
        #canvas-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); line-height: 0; margin-bottom: 30px; }
        #stage { max-width: 100%; height: auto; }

        #project-controls { width: 100%; max-width: 550px; }
        
        #actionBtn { margin-top: 25px; padding: 18px 80px; font-size: 1.3rem; background: #e74c3c; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); transition: 0.3s; }
        #actionBtn:hover { background: #c0392b; transform: scale(1.05); }
        #status { margin-top: 20px; color: #95a5a6; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="sidebar">
    <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <h3>📁 Projects</h3>
    <div id="project-list"></div>
    <div style="font-size: 0.75rem; color: #7f8c8d; text-align: center;">Powered by Pyodide</div>
</div>

<div id="main">
    <h1 id="title">Select a Project</h1>
    <div id="canvas-container">
        <canvas id="stage" width="500" height="500"></canvas>
    </div>
    <div id="project-controls"></div>
    <button id="actionBtn" onclick="triggerPython()">Run Action</button>
    <div id="status">Initializing Python...</div>
</div>

<script>
    let pyodide;
    let currentApp = null;
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');

    // サイドバーの開閉切り替え
    function toggleSidebar() {
        document.body.classList.toggle('sidebar-closed');
        const btn = document.getElementById('sidebar-toggle');
        // サイドバーが閉じているときはアイコンを変えるなどの演出も可能
    }

    async function init() {
        try {
            pyodide = await loadPyodide();
            document.getElementById('status').innerText = "Python Ready.";
            loadProjectList();
        } catch (e) {
            document.getElementById('status').innerText = "Error: Python failed to load.";
            console.error(e);
        }
    }
    init();

    function loadProjectList() {
        const dirs = ["roulette_project", "dice_project"]; 
        const list = document.getElementById('project-list');
        list.innerHTML = "";
        dirs.forEach(dir => {
            const btn = document.createElement('button');
            btn.className = "menu-btn";
            btn.innerText = "▶ " + dir;
            btn.onclick = () => {
                loadProject(dir);
                // モバイル端末などの場合、クリック時に自動で閉じるならここに追加
                // if(window.innerWidth < 768) toggleSidebar();
            };
            list.appendChild(btn);
        });
    }

    async function loadProject(dir) {
        document.getElementById('status').innerText = `Loading ${dir}...`;
        try {
            const resp = await fetch(`./${dir}/main.py`);
            if (!resp.ok) throw new Error("File not found");
            const code = await resp.text();
            
            await pyodide.runPythonAsync(code);
            currentApp = pyodide.globals.get('App')();
            
            document.getElementById('title').innerText = dir;
            
            const controls = document.getElementById('project-controls');
            controls.innerHTML = currentApp.get_html_layout ? currentApp.get_html_layout() : "";
            
            const scripts = controls.querySelectorAll("script");
            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                newScript.text = oldScript.text;
                document.body.appendChild(newScript).parentNode.removeChild(newScript);
            });

            render();
            document.getElementById('status').innerText = "Project Loaded.";
        } catch (e) {
            document.getElementById('status').innerText = "Load Error.";
            console.error(e);
        }
    }

    function triggerPython() {
        if (currentApp) { currentApp.on_click(); animate(); }
    }

    function animate() {
        if (!currentApp) return;
        currentApp.update();
        render();
        if (!currentApp.is_finished()) requestAnimationFrame(animate);
    }

    function render() {
        if (!currentApp) return;
        const rawData = currentApp.get_draw_data();
        const drawData = rawData.toJs({ dict_converter: Object.fromEntries });
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawData.forEach(obj => {
            const cx = 250 + (obj.x_off || 0);
            const cy = 250 + (obj.y_off || 0);
            if (obj.type === 'arc') {
                ctx.beginPath();
                ctx.fillStyle = obj.color || "white";
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, obj.radius, obj.start, obj.end);
                ctx.lineTo(cx, cy);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();
            } 
            else if (obj.type === 'rect') {
                ctx.beginPath();
                ctx.strokeStyle = obj.color || "black";
                ctx.lineWidth = obj.lineWidth || 2;
                ctx.strokeRect(cx - obj.width/2, cy - obj.height/2, obj.width, obj.height);
            }
            else if (obj.type === 'text') {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(obj.angle || 0);
                ctx.fillStyle = obj.color || "black";
                ctx.font = "bold 24px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(obj.text, obj.x || 0, obj.y || 0);
                ctx.restore();
            }
        });
    }

    window.updateProjectData = function() {
        if (!currentApp) return;
        const data = {};
        document.querySelectorAll('#project-controls input, #project-controls textarea').forEach(el => {
            data[el.id] = el.value;
        });
        currentApp.set_data(pyodide.toPy(data));
        render();
    };
</script>
</body>
</html>
