<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Python WorkStation</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root { 
            --bg: #f0f2f5; 
            --panel: #2c3e50; 
            --accent: #3498db; 
            --sidebar-width: 280px;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; height: 100vh; margin: 0; background: var(--bg); color: #333; overflow: hidden; }
        
        /* サイドバー設定 */
        #sidebar { 
            width: var(--sidebar-width); 
            background: var(--panel); 
            color: white; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute; /* スマホで上に重ねるため */
            height: 100%;
            z-index: 100;
        }
        
        /* 閉じた状態（左側に隠す） */
        body.sidebar-closed #sidebar { transform: translateX(-100%); }

        /* 開閉スイッチ（タブ） */
        #sidebar-toggle {
            position: absolute;
            right: -50px;
            top: 15px;
            width: 50px;
            height: 50px;
            background: var(--panel);
            color: white;
            border: none;
            border-radius: 0 12px 12px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 3px 0 8px rgba(0,0,0,0.15);
        }

        #sidebar h3 { margin-top: 10px; border-bottom: 2px solid #34495e; padding-bottom: 10px; font-size: 1.2rem; }
        #project-list { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
        .menu-btn { width: 100%; padding: 15px; margin-bottom: 12px; background: #34495e; color: white; border: none; border-radius: 10px; cursor: pointer; text-align: left; font-size: 1rem; }
        
        /* メインエリア */
        #main { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            overflow-y: auto; 
            width: 100%;
            margin-left: 0; /* 初期はサイドバーを隠す前提 */
        }

        /* キャンバスをレスポンシブに */
        #canvas-container { 
            background: white; 
            padding: 10px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            line-height: 0; 
            margin-bottom: 20px;
            width: 100%;
            max-width: 520px;
            display: flex;
            justify-content: center;
        }
        #stage { 
            width: 100% !important; 
            height: auto !important; 
            max-width: 500px;
            aspect-ratio: 1 / 1;
        }

        #title { font-size: 1.5rem; margin: 10px 0 15px 0; color: var(--panel); text-align: center; }
        #project-controls { width: 100%; max-width: 500px; }
        
        /* アクションボタン（スマホで押しやすく巨大化） */
        #actionBtn { 
            margin: 20px 0;
            width: 100%;
            max-width: 400px;
            padding: 20px; 
            font-size: 1.4rem; 
            background: #e74c3c; 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        /* オーバーレイ（サイドバーが開いている時に背景を暗くする） */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 90;
        }
        body:not(.sidebar-closed) #overlay { display: block; }

        @media (min-width: 769px) {
            /* PCの場合はオーバーレイ不要、サイドバーを常に横に置く設定も可能 */
            #main { padding: 40px; }
            #sidebar-toggle { top: 20px; }
        }
    </style>
</head>
<body class="sidebar-closed"> <!-- 初期状態は閉じておく -->

<div id="overlay" onclick="toggleSidebar()"></div>

<div id="sidebar">
    <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <h3>📁 Projects</h3>
    <div id="project-list"></div>
    <div style="font-size: 0.75rem; color: #7f8c8d; text-align: center; margin-top: auto;">Powered by Pyodide</div>
</div>

<div id="main">
    <h1 id="title">Select a Project</h1>
    <div id="canvas-container">
        <canvas id="stage" width="500" height="500"></canvas>
    </div>
    <div id="project-controls"></div>
    <button id="actionBtn" onclick="triggerPython()">Run Action</button>
    <div id="status">Initializing...</div>
</div>

<script>
    let pyodide;
    let currentApp = null;
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');

    function toggleSidebar() {
        document.body.classList.toggle('sidebar-closed');
    }

    async function init() {
        try {
            pyodide = await loadPyodide();
            document.getElementById('status').innerText = "Python Ready.";
            loadProjectList();
        } catch (e) {
            document.getElementById('status').innerText = "Load Error.";
        }
    }
    init();

    function loadProjectList() {
        const dirs = ["roulette", "dice", "timer"]; 
        const list = document.getElementById('project-list');
        list.innerHTML = "";
        dirs.forEach(dir => {
            const btn = document.createElement('button');
            btn.className = "menu-btn";
            btn.innerText = "▶ " + dir;
            btn.onclick = () => {
                loadProject(dir);
                if (window.innerWidth <= 768) toggleSidebar(); // スマホなら選択後に閉じる
            };
            list.appendChild(btn);
        });
    }

    async function loadProject(dir) {
        document.getElementById('status').innerText = `Loading...`;
        try {
            const resp = await fetch(`./${dir}/main.py`);
            const code = await resp.text();
            await pyodide.runPythonAsync(code);
            currentApp = pyodide.globals.get('App')();
            
            document.getElementById('title').innerText = dir;
            const controls = document.getElementById('project-controls');
            controls.innerHTML = currentApp.get_html_layout ? currentApp.get_html_layout() : "";
            
            // Scriptの再実行
            controls.querySelectorAll("script").forEach(oldScript => {
                const newScript = document.createElement("script");
                newScript.text = oldScript.text;
                document.body.appendChild(newScript).parentNode.removeChild(newScript);
            });

            render();
            document.getElementById('status').innerText = "Ready.";
        } catch (e) {
            document.getElementById('status').innerText = "Error.";
        }
    }

    function triggerPython() {
        if (currentApp) { currentApp.on_click(); animate(); }
    }

    function animate() {
        if (!currentApp) return;
        currentApp.update();
        render();
        if (!currentApp.is_finished()) requestAnimationFrame(animate);
    }

    function render() {
        if (!currentApp) return;
        const rawData = currentApp.get_draw_data();
        const drawData = rawData.toJs({ dict_converter: Object.fromEntries });
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawData.forEach(obj => {
            const cx = 250 + (obj.x_off || 0);
            const cy = 250 + (obj.y_off || 0);
            if (obj.type === 'arc') {
                ctx.beginPath();
                ctx.fillStyle = obj.color || "white";
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, obj.radius, obj.start, obj.end);
                ctx.lineTo(cx, cy);
                ctx.fill();
                ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
            } 
            else if (obj.type === 'rect') {
                ctx.beginPath();
                ctx.strokeStyle = obj.color || "black"; ctx.lineWidth = 3;
                ctx.strokeRect(cx - obj.width/2, cy - obj.height/2, obj.width, obj.height);
            }
            else if (obj.type === 'text') {
                ctx.save();
                ctx.translate(cx, cy); ctx.rotate(obj.angle || 0);
                ctx.fillStyle = obj.color || "black";
                ctx.font = "bold 24px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(obj.text, obj.x || 0, obj.y || 0);
                ctx.restore();
            }
        });
    }

    window.updateProjectData = function() {
        if (!currentApp) return;
        const data = {};
        document.querySelectorAll('#project-controls input, #project-controls textarea').forEach(el => {
            data[el.id] = el.value;
        });
        currentApp.set_data(pyodide.toPy(data));
        render();
    };
</script>
</body>
</html>
